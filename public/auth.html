<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | RenderKit API</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            overflow: hidden;
            display: flex;
            height: 100vh;
        }
        .auth-container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .auth-left {
            flex: 1.2;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            filter: grayscale(0.5) contrast(1.2);
        }
        .auth-left::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, transparent, rgba(0,0,0,0.8));
        }
        .auth-overlay-text {
            position: absolute;
            z-index: 10;
            bottom: 10%;
            left: 10%;
            max-width: 600px;
        }
        .auth-overlay-text h2 {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }
        .auth-overlay-text p {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent);
        }
        .auth-right {
            flex: 0.8;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            border-left: 8px solid var(--border);
            position: relative;
        }
        .auth-form-wrapper {
            width: 100%;
            max-width: 450px;
        }
        .auth-logo {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 4rem;
            letter-spacing: -2px;
        }
        .auth-logo span {
            background: var(--accent);
            color: #000;
            padding: 0 4px;
        }
        .auth-form input {
            width: 100%;
            padding: 1.5rem;
            background: #000;
            border: 4px solid var(--border);
            color: #fff;
            margin-bottom: 2rem;
            font-family: inherit;
            font-weight: 800;
            font-size: 1rem;
        }
        .auth-form input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 8px 8px 0 var(--accent-dim);
        }
        .auth-toggle {
            margin-top: 2rem;
            font-weight: 700;
            color: var(--text-dim);
            text-align: center;
        }
        .auth-toggle span {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
        }
        .back-home {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <img src="auth-bg.png" alt="Auth Visual">
            <div class="auth-overlay-text">
                <h2>THE ENGINE <br>OF THE <span>FUTURE.</span></h2>
                <p>// PIPELINE ACCESS: GRANTED</p>
            </div>
        </div>
        <div class="auth-right">
            <a href="index.html" class="back-home">← BACK TO SYSTEM</a>
            <div class="auth-form-wrapper">
                <div class="auth-logo">RENDER<span>KIT</span></div>
                <div id="auth-form-container">
                    <h2 id="auth-title" style="font-size: 2rem; margin-bottom: 1rem; text-transform: uppercase;">Identity Verification</h2>
                    <p id="auth-subtitle" style="color: var(--text-dim); margin-bottom: 3rem; font-weight: 600;">Enter your encrypted credentials.</p>
                    
                    <form id="auth-form" class="auth-form">
                        <input type="email" id="auth-email" placeholder="EMAIL ADDRESS" required>
                        <input type="password" id="auth-password" placeholder="PASSWORD" required>
                        <button type="submit" id="auth-submit" class="btn btn-primary" style="width: 100%;">Initialize Session</button>
                    </form>
                    
                    <p class="auth-toggle">
                        <span id="toggle-text">Need to register a new node?</span> 
                        <span id="toggle-auth">Create Account</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Specific override for auth page redirection
        const supabaseUrl = 'https://cvsdvxygucjbbtyydgmx.supabase.co';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY'; // This will be handled in script.js but added here for safety
        
        // Listen for auth state to redirect to dashboard on index.html if logged in
        document.addEventListener('DOMContentLoaded', () => {
            // Logic handled by script.js, but ensures the form is ready
            console.log('Auth page initialized');
        });
    </script>
</body>
</html>
